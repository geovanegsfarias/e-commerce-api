spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  flyway:
    enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          public:
            key: classpath:app.pub
          private:
            key: classpath:app.key

  stripe:
    api:
      key: api_key
    public:
      key: public_key
    webhook:
      secret: webhook_secret